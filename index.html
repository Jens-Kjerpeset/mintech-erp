<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="theme-color" content="#09090b" />
    <meta name="description" content="Mintech ERP Dashboard - Enterprise brutalist UI" />
    
    <!-- Security Configuration -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https:;" />
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- <link rel="preconnect" href="https://fonts.googleapis.com"> -->
    <!-- TODO: Update analytics ID for production -->
    
    <title>Mintech | ERP System</title>
    
    <style>
      /* Design Tokens */
      :root {
        --app-bg: #09090b;
        --app-fg: #ffffff;
        --app-font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        --loader-transition: opacity 0.3s ease;
      }
      /* Initial loader to prevent FOUC and provide visual feedback before bundle execution */
      html, body { margin: 0; background-color: var(--app-bg); color: var(--app-fg); }
      #app-loader {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        display: flex; justify-content: center; align-items: center;
        background: var(--app-bg); z-index: 9999;
        font-family: var(--app-font-mono);
        transition: var(--loader-transition);
      }
      .loader-text {
        animation: pulse 1.5s infinite; letter-spacing: 2px;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this application.</noscript>
    
    <div id="app-loader">
      <div class="loader-text">INITIALIZING...</div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Load cleanup script -->
    <script>
      window.addEventListener('load', () => {
        const loader = document.getElementById('app-loader');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => loader.remove(), 300);
        }
      });
    </script>
  </body>
</html>
